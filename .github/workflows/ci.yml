name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Backend — lint, migrate, test with coverage
  # -------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: infragraph
          POSTGRES_PASSWORD: infragraph
          POSTGRES_DB: infragraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infragraph"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      INFRAGRAPH_DATABASE_URL: postgresql+asyncpg://infragraph:infragraph@localhost:5432/infragraph

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint
        run: cd backend && ruff check .

      - name: Run migrations
        run: cd backend && alembic upgrade head

      - name: Test with coverage
        run: |
          cd backend
          python -m pytest -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 7

  # -------------------------------------------------------------------
  # Frontend — install, lint, build
  # -------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build
        env:
          BACKEND_URL: http://localhost:8000

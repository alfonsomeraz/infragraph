name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: infragraph
          POSTGRES_PASSWORD: infragraph
          POSTGRES_DB: infragraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infragraph"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      INFRAGRAPH_DATABASE_URL: postgresql+asyncpg://infragraph:infragraph@localhost:5432/infragraph

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run migrations
        run: cd backend && alembic upgrade head

      - name: Lint
        run: cd backend && ruff check .

      - name: Test
        run: cd backend && python -m pytest -v
